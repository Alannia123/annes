<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1128" viewBox="0 0 2000 1128">
  <defs>
    <!-- Soft purple background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8f7ab8"/>
      <stop offset="55%" stop-color="#a492c8"/>
      <stop offset="100%" stop-color="#b7acd7"/>
    </linearGradient>

    <!-- Underline gradient -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd36e"/>
      <stop offset="50%" stop-color="#ff9f43"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>

    <!-- Soft shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.18"/>
    </filter>

    <!-- Glass -->
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.10"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="2000" height="1128" fill="url(#bg)"/>

  <!-- Subtle enterprise polygons -->
  <g fill="#ffffff" opacity="0.06">
    <polygon points="0,1040 460,760 1500,1128 0,1128"/>
    <polygon points="420,760 320,0 0,0 0,640"/>
    <polygon points="1020,0 2000,980 2000,420 1760,0"/>
  </g>

  <!-- Soft vignette -->
  <g opacity="0.10">
    <ellipse cx="1000" cy="560" rx="720" ry="360" fill="#ffffff"/>
  </g>

  <!-- Decorative dots (very subtle) -->
  <g fill="#ffffff" opacity="0.12">
    <circle cx="260" cy="260" r="8"/>
    <circle cx="520" cy="200" r="6"/>
    <circle cx="1580" cy="260" r="8"/>
    <circle cx="1730" cy="360" r="6"/>
    <circle cx="1420" cy="760" r="7"/>
    <circle cx="760" cy="900" r="6"/>
  </g>

  <!-- =========================
       SCHOOL MATERIALS (LEFT)
  ========================== -->
  <g transform="translate(170,690)" filter="url(#softShadow)">
    <!-- Pencil holder -->
    <g>
      <rect x="0" y="130" width="170" height="210" rx="24" fill="#78c2a4"/>
      <rect x="0" y="130" width="170" height="56" rx="24" fill="#63b293"/>
      <rect x="26" y="160" width="118" height="150" rx="18" fill="#ffffff" opacity="0.12"/>
    </g>

    <!-- Pencils -->
    <g>
      <rect x="35" y="0" width="18" height="170" rx="9" fill="#f5b267"/>
      <polygon points="35,0 44,-24 53,0" fill="#6c4f3d"/>
      <rect x="75" y="-10" width="18" height="190" rx="9" fill="#7ec8e3"/>
      <polygon points="75,-10 84,-36 93,-10" fill="#6c4f3d"/>
      <rect x="115" y="10" width="18" height="170" rx="9" fill="#ffd36e"/>
      <polygon points="115,10 124,-14 133,10" fill="#6c4f3d"/>
    </g>

    <!-- Sticky note -->
    <g transform="translate(210,250)">
      <rect x="0" y="0" width="110" height="84" rx="14" fill="#ffd36e"/>
      <rect x="0" y="0" width="110" height="22" rx="14" fill="#ffffff" opacity="0.18"/>
    </g>

    <!-- Paper clips -->
    <g transform="translate(40,365)" stroke="#ffd36e" stroke-width="10" fill="none" opacity="0.9">
      <path d="M0 40 C0 10, 50 10, 50 40 C50 70, 0 70, 0 40 Z"/>
      <path d="M80 50 C80 30, 120 30, 120 50 C120 70, 80 70, 80 50 Z" opacity="0.75"/>
    </g>
  </g>

<!--  &lt;!&ndash; Open notebook (LEFT-BOTTOM) &ndash;&gt;-->
