<!--      <line x1="290" y1="115" x2="476" y2="115"/>-->
<!--      <line x1="290" y1="145" x2="476" y2="145"/>-->
<!--    </g>-->
<!--  </g>-->

  <!-- =========================
       SCHOOL MATERIALS (RIGHT)
  ========================== -->

  <!-- Book -->
  <g transform="translate(1460,720)" filter="url(#softShadow)">
    <rect x="0" y="0" width="360" height="240" rx="26" fill="#8fd0df"/>
    <rect x="0" y="0" width="360" height="52" rx="26" fill="#ffffff" opacity="0.14"/>
    <rect x="0" y="180" width="360" height="60" rx="0" fill="#ffffff" opacity="0.50"/>
    <rect x="40" y="68" width="280" height="8" rx="4" fill="#ffffff" opacity="0.22"/>
    <rect x="40" y="92" width="240" height="8" rx="4" fill="#ffffff" opacity="0.18"/>
  </g>

  <!-- Two pencils -->
  <g transform="translate(1340,980) rotate(-10)" filter="url(#softShadow)">
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="380" height="30" rx="15" fill="#f5b267"/>
      <rect x="320" y="0" width="60" height="30" rx="15" fill="#ffd6a5"/>
      <polygon points="0,0 -28,15 0,30" fill="#6c4f3d"/>
    </g>
    <g transform="translate(40,52)">
      <rect x="0" y="0" width="320" height="28" rx="14" fill="#78c2a4"/>
      <rect x="270" y="0" width="50" height="28" rx="14" fill="#cfe5dc"/>
      <polygon points="0,0 -26,14 0,28" fill="#2e3a3b"/>
    </g>
  </g>

  <!-- Paper plane top-left (optional subtle) -->
  <g transform="translate(250,170)" opacity="0.35">
    <polygon points="0,70 240,0 170,120" fill="#a6e2ef"/>
    <path d="M-40 110 C-90 150 -60 205 20 215" fill="none" stroke="#a6e2ef" stroke-width="6" stroke-dasharray="16 14"/>
  </g>

  <!-- =========================
       POWERED BY AI (BOTTOM-RIGHT)
  ========================== -->
  <g transform="translate(1340,1010)">
    <!-- Glass pill background -->
    <rect x="0" y="0" width="600" height="92" rx="24" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.18"/>

    <!-- Small AI spark icon -->
    <g transform="translate(26,18)">
      <circle cx="28" cy="28" r="28" fill="#ffffff" opacity="0.12"/>
      <path d="M28 6 L34 22 L50 28 L34 34 L28 50 L22 34 L6 28 L22 22 Z"
            fill="url(#accent)" opacity="0.95"/>
    </g>

    <!-- Text -->
    <text x="92" y="40"
          font-family="Poppins, Inter, Segoe UI, Arial, sans-serif"
          font-size="28"
          font-weight="700"
          fill="#ffffff"
          opacity="0.92">POWERED BY AI</text>

    <text x="92" y="68"
          font-family="Poppins, Inter, Segoe UI, Arial, sans-serif"
          font-size="22"
          font-weight="600"
          fill="#ffffff"
          opacity="0.70">Analysis • Insights • Reports</text>

    <!-- Accent underline -->
    <rect x="92" y="74" width="240" height="4" rx="2" fill="url(#accent)" opacity="0.95"/>
  </g>
</svg>
